name: be_stayhub

x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile
  args:
    user: ${DOCKER_USER:-khiem}
    uid: ${DOCKER_UID:-1000}

x-backend-environment: &backend-environment
  APP_USER: ${DOCKER_USER:-khiem}
  APP_UID: ${DOCKER_UID:-1000}
  COMPOSER_CACHE_DIR: /tmp/composer-cache
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}

x-backend-volumes: &backend-volumes
  - type: bind
    source: ./BE_StayHub
    target: /var/www/html/BE_StayHub
  - type: volume
    source: backend_vendor
    target: /var/www/html/BE_StayHub/vendor
  - type: volume
    source: backend_composer_cache
    target: /tmp/composer-cache

services:
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-stay_hub}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-12345678}
      MYSQL_USER: ${DB_USERNAME:-stay_hub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-12345678}
    command: --default-authentication-plugin=mysql_native_password --max_connections=500
    ports:
      - '${DB_FORWARD_PORT:-3308}:3306'
    volumes:
      - type: volume
        source: dbdata_new
        target: /var/lib/mysql
    healthcheck:
      test: [ 'CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent' ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      laravel_network:
        aliases:
          - db

  

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - '${REDIS_FORWARD_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      laravel_network:
        aliases:
          - redis

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: laravel_meilisearch
    restart: unless-stopped
    ports:
      - '${MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: 'true'
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-12345678}
    volumes:
      - type: volume
        source: meili_data
        target: /meili_data
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -fsS http://127.0.0.1:7700/health >/dev/null || exit 1' ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      laravel_network:
        aliases:
          - meilisearch



  app:
    build: *backend-build
    container_name: laravel_app
    restart: unless-stopped
    environment: *backend-environment
    working_dir: /var/www/html/BE_StayHub
    volumes: *backend-volumes
    command: [ 'sh', '/usr/local/bin/start-container.sh', 'app' ]
    ports:
      - '${APP_PORT:-8000}:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'test -f artisan && curl -fsS http://127.0.0.1:8000/sanctum/csrf-cookie >/dev/null || exit 1' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - laravel_network

  horizon:
    build: *backend-build
    container_name: laravel_horizon
    restart: unless-stopped
    environment: *backend-environment
    working_dir: /var/www/html/BE_StayHub
    volumes: *backend-volumes
    command: [ 'sh', '/usr/local/bin/start-container.sh', 'horizon' ]
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'test -f artisan && test -f vendor/autoload.php && pgrep -f "artisan horizon" >/dev/null || exit 1' ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - laravel_network

  frontend:
    image: node:22-alpine
    container_name: stayhub_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - type: bind
        source: ./FE_StayHub
        target: /app
      - type: volume
        source: frontend_node_modules
        target: /app/node_modules
      - type: volume
        source: frontend_npm_cache
        target: /root/.npm
    command: sh -lc 'set -e; lock_hash="$$(sha256sum package-lock.json | cut -d " " -f 1)"; installed_hash="$$(cat node_modules/.package-lock.sha256 2>/dev/null || true)"; if [ ! -f node_modules/.package-lock.sha256 ] || [ "$$lock_hash" != "$$installed_hash" ]; then npm ci --prefer-offline; echo "$$lock_hash" > node_modules/.package-lock.sha256; fi; npm run dev -- --host 0.0.0.0 --port 80'
    expose:
      - '80'
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: [ 'CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:80\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - laravel_network

  webserver:
    build:
      context: ./nginx
    image: stayhub-nginx:latest
    container_name: laravel_webserver
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-8080}:80'
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'test -s /etc/nginx/conf.d/app.conf && test -s /etc/nginx/conf.d/frontend.conf && wget --no-verbose --tries=1 --spider http://127.0.0.1/sanctum/csrf-cookie || exit 1' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - laravel_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - '${PHPMYADMIN_PORT:-8082}:80'
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_network



  cloudflared:
    build:
      context: .
      dockerfile: docker/cloudflared/Dockerfile
    image: stayhub-cloudflared:latest
    container_name: stayhub_tunnel
    profiles:
      - tunnel
    restart: unless-stopped
    environment:
      CLOUDFLARED_ENV_FILE: /run/secrets/backend_env
    command: [ '--no-autoupdate', 'tunnel', 'run' ]
    secrets:
      - backend_env
    depends_on:
      webserver:
        condition: service_healthy
      phpmyadmin:
        condition: service_started
    networks:
      - laravel_network

networks:
  laravel_network:
    name: stayhub_laravel_network

secrets:
  backend_env:
    file: ./BE_StayHub/.env

volumes:
  backend_vendor:
    name: stayhub_backend_vendor
  backend_composer_cache:
    name: stayhub_backend_composer_cache
  frontend_node_modules:
    name: stayhub_frontend_node_modules
  frontend_npm_cache:
    name: stayhub_frontend_npm_cache
  ai_deepface_cache:
    name: stayhub_ai_deepface_cache
  dbdata_new:
    name: stayhub_dbdata_new
  mongodata:
    external: true
    name: repokytucxaphongtro_mongodata
  redis_data:
    name: repokytucxaphongtro_redis_data
  meili_data:
    name: stayhub_meili_data
  minio_data:
    name: stayhub_minio_data
  qdrant_data:
    name: stayhub_qdrant_data
