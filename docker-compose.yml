name: be_stayhub

x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile
  args:
    user: ${DOCKER_USER:-khang}
    uid: ${DOCKER_UID:-1000}

x-backend-environment: &backend-environment
  APP_USER: ${DOCKER_USER:-khang}
  APP_UID: ${DOCKER_UID:-1000}
  COMPOSER_CACHE_DIR: /tmp/composer-cache
  OCTANE_SERVER: ${OCTANE_SERVER:-swoole}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
  PROJECT_MOUNT_ATTEMPTS: ${PROJECT_MOUNT_ATTEMPTS:-60}
  PROJECT_MOUNT_DELAY: ${PROJECT_MOUNT_DELAY:-1}
  ALLOW_IMAGE_FALLBACK: ${ALLOW_IMAGE_FALLBACK:-false}

x-backend-volumes: &backend-volumes
  - type: bind
    source: ./BE_StayHub
    target: /var/www/html/BE_StayHub
  - type: volume
    source: backend_vendor
    target: /var/www/html/BE_StayHub/vendor
  - type: volume
    source: backend_composer_cache
    target: /tmp/composer-cache

services:
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-stay_hub}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-12345678}
      MYSQL_USER: ${DB_USERNAME:-stay_hub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-12345678}
    command: --default-authentication-plugin=mysql_native_password --max_connections=500
    ports:
      - '${DB_FORWARD_PORT:-3308}:3306'
    volumes:
      - type: volume
        source: dbdata_new
        target: /var/lib/mysql
    healthcheck:
      test: [ 'CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent' ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      laravel_network:
        aliases:
          - db


  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-12345678}
    ports:
      - '${REDIS_FORWARD_PORT:-6379}:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-12345678}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-12345678}', 'ping' ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      laravel_network:
        aliases:
          - redis

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: laravel_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-12345678}
    ports:
      - '${REDIS_COMMANDER_PORT:-8083}:8081'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - laravel_network


  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: laravel_meilisearch
    restart: unless-stopped
    ports:
      - '${MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: 'true'
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-12345678}
    volumes:
      - type: volume
        source: meili_data
        target: /meili_data
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -fsS http://127.0.0.1:7700/health >/dev/null || exit 1' ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      laravel_network:
        aliases:
          - meilisearch

  minio:
    image: minio/minio:latest
    container_name: laravel_minio
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-12345678}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-12345678}
    volumes:
      - type: volume
        source: minio_data
        target: /data
    command: server /data --console-address ':9001'
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1' ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      laravel_network:
        aliases:
          - minio

  qdrant:
    image: qdrant/qdrant:latest
    container_name: laravel_qdrant
    restart: unless-stopped
    ports:
      - '${QDRANT_PORT:-6333}:6333'
    volumes:
      - type: volume
        source: qdrant_data
        target: /qdrant/storage
    networks:
      laravel_network:
        aliases:
          - qdrant

  qdrant-init:
    image: curlimages/curl:latest
    container_name: laravel_qdrant_init
    restart: 'no'
    depends_on:
      - qdrant
    command: >
      sh -c "until curl -fsS http://qdrant:6333/ >/dev/null; do echo waiting for qdrant; sleep 2; done; curl -fsS http://qdrant:6333/collections/face_embeddings >/dev/null 2>&1 || curl -fsS -X PUT http://qdrant:6333/collections/face_embeddings -H 'Content-Type: application/json' -d '{\"vectors\":{\"size\":128,\"distance\":\"Cosine\"}}'; echo 'Qdrant collection initialized';"
    networks:
      - laravel_network

  ai-service:
    build:
      context: ./ai-service
    container_name: stayhub_ai_service
    restart: unless-stopped
    ports:
      - '${AI_SERVICE_PORT:-8001}:8000'
    environment:
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONUNBUFFERED: '1'
    volumes:
      - type: bind
        source: ./ai-service
        target: /app
      - type: volume
        source: ai_deepface_cache
        target: /root/.deepface
    command: [ 'uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000', '--reload' ]
    healthcheck:
      test: [ 'CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=5)"' ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      laravel_network:
        aliases:
          - ai-service

  app:
    build: *backend-build
    container_name: laravel_app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: *backend-environment
    working_dir: /var/www/html/BE_StayHub
    volumes: *backend-volumes
    command: [ 'sh', '/usr/local/bin/start-container.sh', 'app' ]
    ports:
      - '${APP_PORT:-8000}:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'cd /var/www/current-backend && test -f artisan && test -f vendor/autoload.php && curl -fsS http://127.0.0.1:8000/up >/dev/null || exit 1' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
    networks:
      - laravel_network

  horizon:
    build: *backend-build
    container_name: laravel_horizon
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: *backend-environment
    working_dir: /var/www/html/BE_StayHub
    volumes: *backend-volumes
    command: [ 'sh', '/usr/local/bin/start-container.sh', 'horizon' ]
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'cd /var/www/current-backend && test -f artisan && test -f vendor/autoload.php && pgrep -f "artisan horizon" >/dev/null || exit 1' ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - laravel_network

  reverb:
    build: *backend-build
    container_name: laravel_reverb
    restart: unless-stopped
    environment: *backend-environment
    working_dir: /var/www/html/BE_StayHub
    volumes: *backend-volumes
    command: [ 'sh', '/usr/local/bin/start-container.sh', 'reverb' ]
    ports:
      - '8009:8009'
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel_network

  frontend:
    image: node:22-alpine
    container_name: stayhub_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1/}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - type: bind
        source: ./FE_StayHub
        target: /app
      - type: volume
        source: frontend_node_modules
        target: /app/node_modules
      - type: volume
        source: frontend_npm_cache
        target: /root/.npm
    command: sh /app/scripts/docker-dev.sh
    expose:
      - '80'
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: [ 'CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:80\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - laravel_network

  webserver:
    build:
      context: ./nginx
    image: stayhub-nginx:latest
    container_name: laravel_webserver
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-8080}:80'
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'test -s /etc/nginx/conf.d/app.conf && test -s /etc/nginx/conf.d/frontend.conf && wget --no-verbose --tries=1 --spider http://127.0.0.1/sanctum/csrf-cookie || exit 1' ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - laravel_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - '${PHPMYADMIN_PORT:-8082}:80'
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_network


  cloudflared:
    build:
      context: .
      dockerfile: docker/cloudflared/Dockerfile
    image: stayhub-cloudflared:latest
    container_name: stayhub_tunnel
    profiles:
      - tunnel
    restart: unless-stopped
    environment:
      CLOUDFLARED_ENV_FILE: /run/secrets/backend_env
    command: [ '--no-autoupdate', 'tunnel', 'run' ]
    secrets:
      - backend_env
    depends_on:
      webserver:
        condition: service_healthy
      phpmyadmin:
        condition: service_started
    networks:
      - laravel_network

networks:
  laravel_network:
    external: true
    name: repokytucxaphongtro_laravel_network

secrets:
  backend_env:
    file: ./BE_StayHub/.env

volumes:
  backend_vendor:
    name: stayhub_backend_vendor
  backend_composer_cache:
    name: stayhub_backend_composer_cache
  frontend_node_modules:
  frontend_npm_cache:
    name: stayhub_frontend_npm_cache
  ai_deepface_cache:
    name: stayhub_ai_deepface_cache
  dbdata_new:
    external: true
    name: repokytucxaphongtro_dbdata_new

  redis_data:
    name: repokytucxaphongtro_redis_data
  meili_data:
    external: true
    name: repokytucxaphongtro_meili_data
  minio_data:
    name: stayhub_minio_data
  qdrant_data:
    name: stayhub_qdrant_data
