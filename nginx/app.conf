server {
    listen 80;
    server_name api.stayhub.id.vn;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream app:8000;
    set $minio_upstream minio:9000;
    set $forwarded_proto $scheme;

    if ($http_x_forwarded_proto != "") {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    client_max_body_size 50M;

    # Proxy signed URL MinIO nếu production dùng api.stayhub.id.vn làm public endpoint.
    location ^~ /stay-hub/ {
        proxy_pass http://$minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Forward toàn bộ request của domain backend về Laravel Octane đang chạy trong app container.
    location / {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
