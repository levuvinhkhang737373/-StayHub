[unix_http_server]
# Đổi sang /tmp để tránh lỗi thiếu quyền hoặc thiếu thư mục socket trong container.
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
# BẮT BUỘC phải để true trong Docker để Supervisor chạy foreground.
nodaemon=true
user=khang
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
# Trỏ đúng socket để dùng supervisorctl khi cần debug trong container.
serverurl=unix:///tmp/supervisor.sock

# ==========================================================
# 1. BẬT LARAVEL OCTANE (Chạy đúng project thực tế BE_StayHub)
# ==========================================================
[program:laravel-octane]
# Chuẩn bị môi trường, đợi DB/Redis sẵn sàng rồi chạy Laravel Octane bằng OpenSwoole.
command=/bin/sh -lc 'cd /var/www/html/BE_StayHub && test -f artisan && test -f vendor/autoload.php && until nc -z ${DB_HOST:-db} ${DB_PORT:-3306}; do echo waiting for mysql; sleep 2; done && until nc -z ${REDIS_HOST:-redis} ${REDIS_PORT:-6379}; do echo waiting for redis; sleep 2; done && php artisan config:clear || true && php artisan cache:clear || true && php artisan route:clear || true && php artisan view:clear || true && php artisan octane:install --server=swoole || true && php artisan migrate --force && exec php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=${OCTANE_WORKERS:-4} --task-workers=${OCTANE_TASK_WORKERS:-2} --max-requests=${OCTANE_MAX_REQUESTS:-1000}'
user=khang
autostart=true
autorestart=true
stopsignal=QUIT
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/tmp/octane.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5

# ==========================================================
# 2. BẬT QUEUE WORKER (Chạy nhiều process để xử lý queue nhanh hơn)
# ==========================================================
[program:worker-high]
command=/bin/sh -lc 'cd /var/www/html/BE_StayHub && test -f artisan && until [ -f vendor/autoload.php ]; do echo waiting for composer vendor; sleep 2; done && until nc -z ${REDIS_HOST:-redis} ${REDIS_PORT:-6379}; do echo waiting for redis; sleep 2; done && exec php artisan queue:work redis --queue=high,default --sleep=1 --tries=3 --timeout=120 --max-time=3600'
user=khang
directory=/var/www/html/BE_StayHub
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=true
stdout_logfile=/tmp/worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
